# Generalization / honesty harness. Runs the extraction-honesty invariants
# against a pinned, architecturally-diverse corpus of real design systems
# (Vue / Svelte / React / CSS-class), fetched via codeload at test time
# (never vendored). Asserts only the ENFORCED (repo × invariant) statuses —
# a regression on a shipped honesty property fails here. KNOWN-GAP statuses
# are logged (the `[harness]` lines = the internal scorecard's input), not
# asserted. NOT a required status check yet — the owner promotes it to
# required. Skips on PRs that don't touch packages/core/**.
name: Generalization harness
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  generalization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect relevant changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}" HEAD \
               | grep -qE '^(packages/core/|\.github/workflows/generalization\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No packages/core changes — generalization harness skipped."
          fi
      - if: steps.detect.outputs.run == 'true'
        uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - if: steps.detect.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - if: steps.detect.outputs.run == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.detect.outputs.run == 'true'
        run: pnpm -F lyse build
      - name: Run generalization harness
        if: steps.detect.outputs.run == 'true'
        run: |
          set -o pipefail
          LYSE_GENERALIZATION=1 pnpm -F lyse exec vitest run tests/generalization --disableConsoleIntercept 2>&1 | tee generalization-output.txt
      - name: Upload harness output
        if: steps.detect.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: generalization-output
          path: generalization-output.txt
          retention-days: 7
