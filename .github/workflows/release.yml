name: Release
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
  id-token: write
concurrency: release-${{ github.ref }}
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # Opens/refreshes the "Version Packages" PR when changesets are pending,
      # and publishes (pnpm release) when that PR is merged into main.
      - uses: changesets/action@v1
        with:
          # `pnpm run`, not `pnpm version`/`pnpm release` — `version` is a pnpm
          # built-in (prints the version table, never runs the package.json
          # script), so the bare form silently no-ops the version bump.
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
