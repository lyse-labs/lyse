# Golden-corpus snapshot job. Runs the golden suite against pinned
# third-party repos fetched via codeload at test time (never vendored).
# NOT a required status check yet — the owner promotes it to required
# after P0 lands (LYSE-MISSION §4.1). Skips on PRs that don't touch
# packages/core/** (this workflow file itself always counts as relevant).
name: Bench golden
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bench-golden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect relevant changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}" HEAD \
               | grep -qE '^(packages/core/|\.github/workflows/bench-golden\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No packages/core changes — golden corpus skipped."
          fi
      - if: steps.detect.outputs.run == 'true'
        uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - if: steps.detect.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - if: steps.detect.outputs.run == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.detect.outputs.run == 'true'
        run: pnpm -F lyse build
      - name: Run golden corpus
        if: steps.detect.outputs.run == 'true'
        run: |
          set -o pipefail
          LYSE_GOLDEN=1 pnpm -F lyse test tests/golden/ 2>&1 | tee golden-output.txt
      - name: Upload golden output
        if: steps.detect.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: golden-output
          path: golden-output.txt
          retention-days: 7
