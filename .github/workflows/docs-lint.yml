name: Docs lint

on:
  # No paths filter on pull_request: "Check markdown links" is a required
  # status check, and a path-filtered required check is never reported on PRs
  # that touch no markdown — which deadlocks the merge. lychee scans all *.md
  # regardless, so it stays cheap (~13s) and trivially green when no docs change.
  pull_request:
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/docs-lint.yml"

permissions:
  contents: read

jobs:
  link-check:
    name: Check markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Link check via lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude "^https?://localhost"
            --exclude "^https?://127\.0\.0\.1"
            --exclude "^https?://0\.0\.0\.0"
            --exclude "^https?://(www\.)?example\.com"
            --exclude "^https?://(www\.)?getlyse\.com"
            --exclude "^https?://(www\.)?npmjs\.com/package/(@lyse-labs/)?lyse"
            --exclude "^https?://(www\.)?contributor-covenant\.org"
            --exclude "^https?://news\.layervault\.com"
            --exclude "^https?://design\.systems/slack"
            --exclude "^https?://designerhangout\.co"
            --exclude "^https?://frontendfoxes\.club"
            --exclude "^https?://(www\.)?gnu\.org"
            --timeout 30
            --retry-wait-time 2
            --max-retries 2
            --exclude "^https?://data\.inpi\.fr"
            --exclude "^https?://(.+\.)?medium\.com"
            --exclude "^https?://dash\.cloudflare\.com"
            --exclude "^https?://ojs\.aaai\.org"
            --exclude "^https?://(www\.)?conventionalcommits\.org"
            --exclude "^https?://(www\.)?canvas\.workday\.com"
            --exclude "^https?://(www\.)?cnil\.fr"
            --exclude "^https?://(.+\.)?shields\.io"
            --accept 200,206,429
            './**/*.md'
          fail: true
          format: markdown
          output: ./lychee-out.md

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lychee-report
          path: ./lychee-out.md

  prose-lint:
    name: Lint prose style (advisory, doesn't fail CI)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install vale
        run: |
          set -o pipefail
          curl -sL https://github.com/errata-ai/vale/releases/download/v3.7.0/vale_3.7.0_Linux_64-bit.tar.gz | tar xz
          sudo mv vale /usr/local/bin/

      - name: Run vale (if .vale.ini present)
        run: |
          if [ -f .vale.ini ]; then
            vale --output=line docs/ README.md
          else
            echo "No .vale.ini configured; skipping prose lint."
          fi
