name: Perf smoke
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# The `perf` job is a required status check on `main`. It must therefore
# report a status on EVERY pull request — otherwise PRs that don't touch
# `packages/core/**` (e.g. docs-only changes) are blocked forever on a
# check that never runs. So the workflow always triggers, and the job
# skips the (expensive) build + perf run when no relevant files changed,
# still reporting success. Keep the job id `perf` — it is the required
# check context.
jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect relevant changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}" HEAD \
               | grep -qE '^(packages/core/|\.github/workflows/perf-smoke\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No packages/core changes — perf smoke skipped (reported as success)."
          fi
      - if: steps.detect.outputs.run == 'true'
        uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - if: steps.detect.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - if: steps.detect.outputs.run == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.detect.outputs.run == 'true'
        run: pnpm -F lyse build
      - name: Run perf smoke tests
        if: steps.detect.outputs.run == 'true'
        run: |
          set -o pipefail
          pnpm -F lyse test tests/perf/ 2>&1 | tee perf-output.txt
      - name: Upload perf output
        if: steps.detect.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: perf-output
          path: perf-output.txt
          retention-days: 7
