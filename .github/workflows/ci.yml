name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  # Cross-platform robustness lane (#104): path handling, line endings, FS case
  # sensitivity. Not a required check until consistently green — advisory signal.
  test-windows:
    runs-on: windows-latest
    # Advisory until consistently green (#104): runs + surfaces cross-platform
    # divergences in the logs, but does not fail the commit status. Flip off
    # continue-on-error + add to required checks once the remaining Windows
    # failures (walker/fix/init path + CRLF normalization) are resolved.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
